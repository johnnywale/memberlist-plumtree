name: Fuzz Testing

on:
  # Run on schedule (weekly) to catch regressions
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: 'Fuzz duration in seconds'
        required: false
        default: '60'
      target:
        description: 'Specific target to fuzz (or "all")'
        required: false
        default: 'all'
  # Run on PRs that modify fuzz targets or core parsing code
  pull_request:
    paths:
      - 'fuzz/**'
      - 'src/message/**'
      - 'src/config.rs'
      - 'src/integration.rs'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - message_decode
          - envelope_decode
          - peer_state
          - config_parse
    steps:
      - uses: actions/checkout@v4

      # cargo-fuzz only needs nightly to *build* fuzz targets (libFuzzer uses
      # -Zsanitizer=address). The cargo-fuzz binary itself builds on stable and
      # invokes `cargo +nightly` internally. So we install both, but cargo-fuzz
      # is fetched as a prebuilt binary to avoid source compilation churn.
      - name: Install Rust nightly (for fuzz targets)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Install Rust stable (for cargo-fuzz host build)
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: Cache fuzz corpus
        uses: actions/cache@v4
        with:
          path: |
            fuzz/corpus
            fuzz/artifacts
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      # Per-step filter (not job-level) because `matrix` isn't available in
      # job-level `if:` expressions — that context only resolves once the
      # matrix has been expanded for an individual step's environment.
      - name: Run fuzzer
        if: >-
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.target == 'all' ||
          github.event.inputs.target == matrix.target
        run: |
          DURATION="${{ github.event.inputs.fuzz_duration || '60' }}"
          echo "Fuzzing ${{ matrix.target }} for ${DURATION} seconds..."
          cargo +nightly fuzz run ${{ matrix.target }} -- \
            -max_total_time=${DURATION} \
            -print_final_stats=1

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crash-${{ matrix.target }}
          path: |
            fuzz/artifacts/${{ matrix.target }}/*
          if-no-files-found: ignore

  # Extended fuzzing for nightly builds
  fuzz-extended:
    name: Extended Fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        target:
          - message_decode
          - envelope_decode
          - peer_state
          - config_parse
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly (for fuzz targets)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Install Rust stable (for cargo-fuzz host build)
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: Cache fuzz corpus
        uses: actions/cache@v4
        with:
          path: |
            fuzz/corpus
            fuzz/artifacts
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Run extended fuzzer (5 minutes)
        run: |
          echo "Extended fuzzing ${{ matrix.target }} for 300 seconds..."
          cargo +nightly fuzz run ${{ matrix.target }} -- \
            -max_total_time=300 \
            -print_final_stats=1

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crash-extended-${{ matrix.target }}
          path: |
            fuzz/artifacts/${{ matrix.target }}/*
          if-no-files-found: ignore

      - name: Upload corpus
        uses: actions/upload-artifact@v4
        with:
          name: corpus-${{ matrix.target }}
          path: |
            fuzz/corpus/${{ matrix.target }}/*
          if-no-files-found: ignore
